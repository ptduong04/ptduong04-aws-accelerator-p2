apiVersion: apps/v1
kind: Deployment
metadata:
  name: xbrain-app
  labels:
    app: xbrain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xbrain
  template:
    metadata:
      labels:
        app: xbrain
    spec:
      containers:
      - name: nginx
        image: xbrain-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: xbrain-service
  labels:
    app: xbrain
spec:
  type: NodePort
  selector:
    app: xbrain
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http
